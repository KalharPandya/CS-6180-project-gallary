<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Detection Pipeline — CS 6180</title>
  <!-- Fix relative path resolution when URL has no trailing slash -->
  <script>!function(){var p=location.pathname;if(!p.endsWith('/')&&!p.match(/\.[a-zA-Z0-9]+$/))p+='/';var b=document.createElement('base');b.href=p.substring(0,p.lastIndexOf('/')+1);document.head.prepend(b);}();</script>
  <!-- VIDEO-ONLY MODE
       Full-screen video player. No markdown loader, no shared stylesheet.
       Drop your video into assets/ and update the <source> src below. -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    /* Layout: nav on top, video fills the rest */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Thin floating nav */
    .top-nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: rgba(0, 0, 0, 0.9);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 10;
    }

    .top-nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }
    .top-nav a:hover { color: #fff; }

    .top-nav .meta {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    /* Video fills remaining height */
    .video-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    .video-stage video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="top-nav">
      <a href="../../index.html">&larr; Back to Gallery</a>
      <span class="meta">Real-Time Object Detection Pipeline &mdash; CS 6180</span>
    </nav>

    <div class="video-stage">
      <!-- Replace demo.mp4 with your actual video file -->
      <video controls>
        <source src="assets/demo.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>
</body>
</html>

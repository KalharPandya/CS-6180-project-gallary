<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="system-ui,sans-serif">
  <!-- Background -->
  <rect width="1200" height="900" fill="#1a1a2e"/>
  <!-- Header band -->
  <rect width="1200" height="120" fill="#16213e"/>
  <text x="600" y="52" font-size="36" font-weight="700" fill="white" text-anchor="middle">Transformer Attention Visualization</text>
  <text x="600" y="90" font-size="18" fill="#a0aec0" text-anchor="middle">David Park · Eve Johnson · CS-6180</text>

  <!-- Column 1: Abstract -->
  <rect x="40" y="140" width="340" height="700" rx="12" fill="#16213e"/>
  <text x="210" y="185" font-size="18" font-weight="700" fill="#90cdf4" text-anchor="middle">Abstract</text>
  <text x="60" y="215" font-size="13" fill="#e2e8f0">We introduce AttentionLens, a tool</text>
  <text x="60" y="235" font-size="13" fill="#e2e8f0">for visualizing multi-head attention</text>
  <text x="60" y="255" font-size="13" fill="#e2e8f0">in BERT-style transformers. By</text>
  <text x="60" y="275" font-size="13" fill="#e2e8f0">projecting attention maps into</text>
  <text x="60" y="295" font-size="13" fill="#e2e8f0">semantic clusters, we reveal that</text>
  <text x="60" y="315" font-size="13" fill="#e2e8f0">heads specialize into syntactic,</text>
  <text x="60" y="335" font-size="13" fill="#e2e8f0">coreference, and positional roles</text>
  <text x="60" y="355" font-size="13" fill="#e2e8f0">without explicit supervision.</text>

  <!-- Column 2: Architecture diagram (simplified) -->
  <rect x="420" y="140" width="360" height="700" rx="12" fill="#16213e"/>
  <text x="600" y="185" font-size="18" font-weight="700" fill="#90cdf4" text-anchor="middle">Architecture</text>
  <!-- Fake attention diagram boxes -->
  <rect x="460" y="210" width="280" height="50" rx="6" fill="#2d3748"/>
  <text x="600" y="241" font-size="13" fill="#e2e8f0" text-anchor="middle">Input Tokens</text>
  <rect x="460" y="290" width="280" height="50" rx="6" fill="#2b6cb0"/>
  <text x="600" y="321" font-size="13" fill="white" text-anchor="middle">Multi-Head Attention (12 heads)</text>
  <rect x="460" y="370" width="280" height="50" rx="6" fill="#2d3748"/>
  <text x="600" y="401" font-size="13" fill="#e2e8f0" text-anchor="middle">Feed-Forward Network</text>
  <rect x="460" y="450" width="280" height="50" rx="6" fill="#6b46c1"/>
  <text x="600" y="481" font-size="13" fill="white" text-anchor="middle">Attention Projection Layer</text>
  <rect x="460" y="530" width="280" height="50" rx="6" fill="#2d3748"/>
  <text x="600" y="561" font-size="13" fill="#e2e8f0" text-anchor="middle">Semantic Cluster Assignment</text>
  <!-- Arrows -->
  <line x1="600" y1="260" x2="600" y2="290" stroke="#4a5568" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="340" x2="600" y2="370" stroke="#4a5568" stroke-width="2"/>
  <line x1="600" y1="420" x2="600" y2="450" stroke="#4a5568" stroke-width="2"/>
  <line x1="600" y1="500" x2="600" y2="530" stroke="#4a5568" stroke-width="2"/>

  <!-- Column 3: Results -->
  <rect x="820" y="140" width="340" height="700" rx="12" fill="#16213e"/>
  <text x="990" y="185" font-size="18" font-weight="700" fill="#90cdf4" text-anchor="middle">Key Results</text>
  <!-- Fake bar chart -->
  <text x="990" y="220" font-size="13" fill="#a0aec0" text-anchor="middle">Head Specialization Rate (%)</text>
  <rect x="860" y="380" width="40" height="100" fill="#2b6cb0"/>
  <rect x="920" y="290" width="40" height="190" fill="#6b46c1"/>
  <rect x="980" y="320" width="40" height="160" fill="#2b6cb0"/>
  <rect x="1040" y="250" width="40" height="230" fill="#276749"/>
  <rect x="1100" y="310" width="40" height="170" fill="#c53030"/>
  <line x1="845" y1="480" x2="1155" y2="480" stroke="#4a5568" stroke-width="1"/>
  <text x="880" y="500" font-size="11" fill="#a0aec0" text-anchor="middle">Syn</text>
  <text x="940" y="500" font-size="11" fill="#a0aec0" text-anchor="middle">Coref</text>
  <text x="1000" y="500" font-size="11" fill="#a0aec0" text-anchor="middle">Pos</text>
  <text x="1060" y="500" font-size="11" fill="#a0aec0" text-anchor="middle">Sem</text>
  <text x="1120" y="500" font-size="11" fill="#a0aec0" text-anchor="middle">Other</text>
  <text x="990" y="550" font-size="12" fill="#68d391" text-anchor="middle">94% heads show clear specialization</text>
</svg>

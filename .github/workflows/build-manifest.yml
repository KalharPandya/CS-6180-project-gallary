name: Update team manifest

on:
  push:
    branches: [main]
    paths:
      - 'teams/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest
        run: node scripts/build.js

      - name: Commit updated manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update teams/manifest.json"
          file_pattern: teams/manifest.json

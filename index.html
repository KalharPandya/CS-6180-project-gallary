<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS 6180 — Generative AI Project Gallery</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="nu-brand-bar">
    <img class="nu-brand-bar-logo" src="assets/logos/nu-logo-white.png" alt="Northeastern University">
    <span class="nu-brand-bar-sep"></span>
    <span class="nu-brand-bar-text">Khoury College of Computer Sciences</span>
  </div>

  <header class="site-header">
    <h1>CS 6180 &mdash; Generative AI</h1>
    <p>Spring 2026 &middot; Student Project Gallery &middot; Khoury College of Computer Sciences, Northeastern University</p>
  </header>

  <nav class="site-nav">
    <a href="northeastern.html">About</a>
    <a href="staff.html">Course Staff</a>
  </nav>

  <div class="gallery-scroll-area">
    <div class="search-wrapper">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="search"
        class="search-input"
        type="search"
        placeholder="Search by team, project title, tag, or member name..."
        aria-label="Search projects"
      >
    </div>

    <main id="gallery" class="gallery" aria-live="polite">
      <div class="empty-state">
        <h2>Loading projects&hellip;</h2>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <img src="assets/logos/nu-logo-white.png" alt="Northeastern University">
    <span class="site-footer-text">CS 6180 &mdash; Generative AI &middot; Spring 2026 &middot; Prof. Ryan Rad &middot; Khoury College of Computer Sciences</span>
  </footer>

  <script src="js/gallery.js"></script>
</body>
</html>

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - curl -sL "https://github.com/git-lfs/git-lfs/releases/download/v3.6.0/git-lfs-linux-amd64-v3.6.0.tar.gz" | tar xz -C /tmp
        - export PATH="$PATH:/tmp/git-lfs-3.6.0"
        - git lfs install
        - git lfs pull
        - node scripts/build.js
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths: []
